# WR 87.5% (+$6.39 on 32 trades) vs overall ~78%. Current champion uses
# gap<=0.30 (looser). Tighter gap may identify "clear consensus" trades
# where oracle lag is the dominant edge, filtering noisy divergence.
#
# Status: challenger (Phase 1 — file only, not yet wired)

