# D Challenger: tighter stop-loss
#
# Hypothesis: champion STOP_LOSS_DELTA=0.15 allows a 15¢ adverse move
# before exit. Max DD = 13% suggests stops fire often. Tighter stop
# (0.10) limits per-trade max loss but increases stop-out rate. If
# Sharpe improves, lower variance trade-off worth it.
#
# Status: shadow only — no capital risk.

variant_id: ch_sl_tight
strategy: D
status: challenger
parent_variant: champion_v1
notes: |
  STOP_LOSS_DELTA 0.15 → 0.10. All other params identical to champion_v1.
  Expected: more stops, smaller max loss/trade, lower DD, lower variance.

params:
  MIN_EDGE: 0.16
  MAX_EDGE: 0.25
  MIN_PRICE: 0.20
  MAX_PRICE: 0.65
  GREEN_BOOK_DELTA: 0.17
  STOP_LOSS_DELTA: 0.10       # ← CHANGED (was 0.15)
  MAX_HOLD_FRACTION: 0.50
  GAME_DURATION_HOURS: 2.5
